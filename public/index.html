<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Transit Orbits</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000011; }
  canvas { display: block; }
  html.cursor-hidden { cursor: none; }
  html.cursor-hidden #legend { opacity: 0.3; transition: opacity 0.5s; }
  html.cursor-hidden #audio-toggle { opacity: 0.1; }
  #audio-toggle.playing { opacity: 0.25; }
  html.cursor-hidden #audio-toggle.playing { opacity: 0.08; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<audio id="bgm" src="https://ice1.somafm.com/deepspaceone-128-mp3" preload="none" loop></audio>
<button id="audio-toggle" style="position:fixed;bottom:16px;left:16px;color:#ffffff;font-family:monospace;font-size:11px;opacity:0.4;background:none;border:none;cursor:pointer;z-index:10;transition:opacity 0.5s;" title="Toggle audio">&#x1f50a; DEEP SPACE ONE</button>
<div id="legend" style="position:fixed;bottom:16px;right:16px;color:#ffffff;font-family:monospace;font-size:11px;opacity:0.5;pointer-events:none;">
  <div style="margin-bottom:4px;opacity:0.7">PHOENIX TRANSIT ORBITS</div>
  <div id="legend-entries"></div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const ROUTES = [
  {
    id: 'MERC', name: 'Mercury', color: '#ff6600', glow: '#ffaa33',
    rx: 0.08, ry: 0.05, tilt: -10
  },
  {
    id: 'VENU', name: 'Venus', color: '#ffcc00', glow: '#ffee44',
    rx: 0.14, ry: 0.09, tilt: 15
  },
  {
    id: 'EART', name: 'Earth', color: '#44ddff', glow: '#88eeff',
    rx: 0.22, ry: 0.14, tilt: -5
  },
  {
    id: 'MARS', name: 'Mars', color: '#ff3333', glow: '#ff7777',
    rx: 0.30, ry: 0.19, tilt: 8
  },
  {
    id: 'JUPI', name: 'Jupiter', color: '#ddaa66', glow: '#eebb77',
    rx: 0.38, ry: 0.24, tilt: -8
  },
  {
    id: 'STRN', name: 'Saturn', color: '#ccaa88', glow: '#ddbb99',
    rx: 0.46, ry: 0.29, tilt: 12
  }
];

const LIGHT_RAIL_ROUTES = new Set(ROUTES.map(r => r.id));
const POLL_INTERVAL = 7000; // ms

const STARS = [];
const STAR_COUNT = 200;

function generateStars() {
  STARS.length = 0;
  for (let i = 0; i < STAR_COUNT; i++) {
    STARS.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.3,
      opacity: Math.random() * 0.5 + 0.1
    });
  }
}

// Regenerate on resize
window.addEventListener('resize', generateStars);
generateStars();

function drawStars(ctx) {
  for (const s of STARS) {
    ctx.globalAlpha = s.opacity;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

const VEHICLES = {}; // keyed by vehicle.id
const DATA_ENDPOINT = 'https://valley-metro-proxy.ccarse.workers.dev/';
let lastFetchTime = 0;
let consecutiveFailures = 0;

async function fetchVehicleData() {
  try {
    const res = await fetch(DATA_ENDPOINT);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.entity || [];
  } catch (err) {
    console.warn('Feed fetch failed:', err.message);
    return null;
  }
}

function updateVehicles(entities, dt) {
  const seen = new Set();

  for (const entity of entities) {
    const v = entity.vehicle;
    if (!v || !v.vehicle || !v.trip) continue;

    const routeId = v.trip.routeId;
    if (!LIGHT_RAIL_ROUTES.has(routeId)) continue;

    const route = ROUTES.find(r => r.id === routeId);
    if (!route) continue;

    const vid = v.vehicle.id;
    seen.add(vid);

    if (!VEHICLES[vid]) {
      // New vehicle: spawn at random angle on its orbit
      const startAngle = Math.random() * Math.PI * 2;
      VEHICLES[vid] = {
        id: vid,
        routeId: routeId,
        angle: startAngle,
        targetAngle: startAngle,
        speed: v.position?.speed || 0,
        label: v.vehicle.label || '',
        bearing: v.position?.bearing || 0,
        currentStatus: v.currentStatus || 'IN_TRANSIT_TO',
        seed: Math.random() * 1000, // unique per-vehicle seed for jitter
      };
    }

    const veh = VEHICLES[vid];

    // Calculate angular velocity from speed
    // 1 m/s = ~0.03 rad/s along orbit (tuned for visual effect)
    const angularVelocity = veh.speed * 0.03;

    // Direction from bearing (0=North=UP, 90=East=RIGHT)
    const bearing = v.position?.bearing ?? veh.bearing;
    const dir = 1;

    // Set target angle — render loop will lerp toward it for smooth motion
    veh.targetAngle += angularVelocity * dir * dt;
    veh.targetAngle = ((veh.targetAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);

    veh.speed = v.position?.speed || 0;
    veh.label = v.vehicle.label || veh.label;
    veh.bearing = bearing;
    veh.currentStatus = v.currentStatus || veh.currentStatus;
  }

  // Remove vehicles no longer in the feed
  for (const vid of Object.keys(VEHICLES)) {
    if (!seen.has(vid)) delete VEHICLES[vid];
  }
}

async function poll() {
  const entities = await fetchVehicleData();
  const now = Date.now();

  if (entities) {
    consecutiveFailures = 0;
    const dt = lastFetchTime ? (now - lastFetchTime) / 1000 : 0;
    lastFetchTime = now;
    updateVehicles(entities, dt);
  } else {
    consecutiveFailures++;
  }
}

setInterval(poll, POLL_INTERVAL);
poll(); // initial fetch

function isDimmed() {
  return consecutiveFailures >= 3;
}

function drawSun(ctx, cx, cy, scale, t) {
  const pulse = 1 + Math.sin(t / 3000 * Math.PI * 2) * 0.3; // 3s cycle
  const r = scale * 0.012 * pulse;
  const opac = 0.6 + Math.sin(t / 3000 * Math.PI * 2) * 0.3;

  // Outer glow rings
  ctx.globalAlpha = opac * 0.3;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 1.8, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, r * 2.5, 0, Math.PI * 2);
  ctx.stroke();

  // Core
  ctx.globalAlpha = opac;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
}

function drawOrbits(ctx, cx, cy, scale) {
  for (const route of ROUTES) {
    const rx = route.rx * scale;
    const ry = route.ry * scale;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((route.tilt * Math.PI) / 180);

    ctx.globalAlpha = isDimmed() ? 0.07 : 0.35;
    ctx.strokeStyle = route.color;
    ctx.lineWidth = 0.8;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    ctx.restore();
  }
}

function drawTrains(ctx, cx, cy, scale, t) {
  const dimFactor = isDimmed() ? 0.3 : 1;

  for (const vid of Object.keys(VEHICLES)) {
    const v = VEHICLES[vid];
    const route = ROUTES.find(r => r.id === v.routeId);
    if (!route) continue;

    const rx = route.rx * scale;
    const ry = route.ry * scale;
    const tiltRad = (route.tilt * Math.PI) / 180;
    const angle = v.angle;

    // Position on rotated ellipse (orbit path, no jitter)
    const ox = cx + Math.cos(angle) * rx * Math.cos(tiltRad) - Math.sin(angle) * ry * Math.sin(tiltRad);
    const oy = cy + Math.cos(angle) * rx * Math.sin(tiltRad) + Math.sin(angle) * ry * Math.cos(tiltRad);

    // Particle flicker / jitter — only when in transit (not arriving/stopped)
    const isJittering = v.currentStatus === 'IN_TRANSIT_TO';
    const jx = isJittering ? Math.sin(t * 0.017 + v.seed) * 0.6 + Math.cos(t * 0.023 + v.seed * 1.7) * 0.4 : 0;
    const jy = isJittering ? Math.cos(t * 0.019 + v.seed * 0.7) * 0.6 + Math.sin(t * 0.013 + v.seed * 3.1) * 0.4 : 0;
    const x = ox + jx;
    const y = oy + jy;

    const speed = v.speed;

    // Glow intensity and trail length based on speed thresholds
    let glowAlpha, trailLen, dotRadius;
    if (speed === 0) {
      glowAlpha = 0.3; trailLen = 0; dotRadius = 1.5;
    } else if (speed < 5) {
      glowAlpha = 0.4; trailLen = 4; dotRadius = 2;
    } else if (speed < 15) {
      glowAlpha = 0.6; trailLen = 10; dotRadius = 2.5;
    } else {
      glowAlpha = 0.9; trailLen = 20; dotRadius = 3;
    }

    // Apply dimming to glowAlpha before any drawing
    glowAlpha *= dimFactor;

    // Draw trail (motion line behind the train) using ellipse parametric eq
    if (trailLen > 0) {
      const dir = 1;
      const steps = Math.max(1, Math.ceil(trailLen / 5));

      // Multi-segment trail with fading opacity
      for (let i = steps - 1; i >= 0; i--) {
        const segAngle = angle - dir * (i + 1) * (0.015 * trailLen / 20);
        const segX = cx + Math.cos(segAngle) * rx * Math.cos(tiltRad) - Math.sin(segAngle) * ry * Math.sin(tiltRad);
        const segY = cy + Math.cos(segAngle) * rx * Math.sin(tiltRad) + Math.sin(segAngle) * ry * Math.cos(tiltRad);
        ctx.globalAlpha = glowAlpha * (0.05 + 0.1 * ((steps - 1) - i));
        ctx.strokeStyle = route.glow;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(segX, segY);
        ctx.stroke();
      }
    }

    // Outer glow
    ctx.globalAlpha = glowAlpha * 0.4;
    ctx.fillStyle = route.glow;
    ctx.beginPath();
    ctx.arc(x, y, dotRadius * 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Inner bright core
    ctx.globalAlpha = glowAlpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(x, y, dotRadius * 0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  }
}

function buildLegend() {
  const container = document.getElementById('legend-entries');
  container.innerHTML = ROUTES.map(r =>
    `<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
      <span style="width:8px;height:8px;border-radius:50%;background:${r.color};display:inline-block;"></span>
      <span>${r.name}</span>
    </div>`
  ).join('');
}
buildLegend();

function render() {
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const scale = Math.min(w, h);
  const t = performance.now();

  // Smooth angle interpolation toward target (lerp each frame)
  const LERP = 0.12;
  for (const vid of Object.keys(VEHICLES)) {
    const v = VEHICLES[vid];
    let diff = v.targetAngle - v.angle;
    // Handle angle wrap-around for shortest path
    if (diff > Math.PI) diff -= Math.PI * 2;
    if (diff < -Math.PI) diff += Math.PI * 2;
    v.angle += diff * LERP;
    v.angle = ((v.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  }

  ctx.clearRect(0, 0, w, h);

  drawStars(ctx);         // static star field
  drawOrbits(ctx, cx, cy, scale);  // orbit rings
  drawTrains(ctx, cx, cy, scale, t);  // vehicles on orbits
  drawSun(ctx, cx, cy, scale, t);  // sun on top

  requestAnimationFrame(render);
}

requestAnimationFrame(render);

let idleTimer;
function resetIdleTimer() {
  document.documentElement.classList.remove('cursor-hidden');
  const legend = document.getElementById('legend');
  if (legend) legend.style.opacity = '';
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    document.documentElement.classList.add('cursor-hidden');
    const legend = document.getElementById('legend');
    if (legend) legend.style.opacity = '0.3';
  }, 3000);
}
document.addEventListener('mousemove', resetIdleTimer);
document.addEventListener('touchstart', resetIdleTimer);
resetIdleTimer();

// Audio: soma.fm Deep Space One
const bgm = document.getElementById('bgm');
const audioBtn = document.getElementById('audio-toggle');
bgm.volume = 0.3;

let audioStarted = false;
function startAudio() {
  if (audioStarted) return;
  bgm.play().then(() => {
    audioStarted = true;
    audioBtn.classList.add('playing');
    audioBtn.textContent = '🔊 DEEP SPACE ONE';
  }).catch(() => {});
}

bgm.addEventListener('play', () => { audioStarted = true; });
audioBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!audioStarted) {
    startAudio();
  } else if (bgm.muted) {
    bgm.muted = false;
    audioBtn.textContent = '🔊 DEEP SPACE ONE';
  } else {
    bgm.muted = true;
    audioBtn.textContent = '🔇 DEEP SPACE ONE';
  }
});
document.addEventListener('click', startAudio, { once: true });
</script>
</body>
</html>
